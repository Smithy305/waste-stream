# Noisy label robustness experiments.
base: base.yaml

experiment_name: noisy_labels

labelled_fraction: 1.0

# Noise injection settings
noise:
  enabled: true
  noise_type: class_flip        # class_flip, bbox_jitter, missing_annot
  noise_rate: 0.2               # probability of corruption per annotation

  # bbox_jitter specific
  bbox_jitter_sigma: 0.05       # std dev as fraction of box dimension

# Training with noise-robust loss
training:
  epochs: 100
  loss_fn: symmetric_ce         # cross_entropy, symmetric_ce, generalised_ce

  # Symmetric CE params
  symmetric_ce:
    alpha: 1.0
    beta: 1.0

  # Generalised CE params
  generalised_ce:
    q: 0.7
